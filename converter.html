<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="css/theme.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
  <h1>Temperature Converter</h1>

  <label for="celsius">Celsius</label>
  <input type="number" id="celsius" />

  <label for="fahrenheit">Fahrenheit</label>
  <input type="number" id="fahrenheit" />

  <script>
    const celsiusInput = document.getElementById("celsius");
    const fahrenheitInput = document.getElementById("fahrenheit");

    // your original function
    function toFahrenheit(celsius) {
      return celsius * 9 / 5 + 32;
    }

    // the reverse direction
    function toCelsius(fahrenheit) {
      return (fahrenheit - 32) * 5 / 9;
    }

    // type in Celsius -> updates Fahrenheit
    celsiusInput.addEventListener("input", () => {
      const c = parseFloat(celsiusInput.value);
      if (!isNaN(c)) {
        fahrenheitInput.value = toFahrenheit(c).toFixed(2);
      }
    });

    // type in Fahrenheit -> updates Celsius
    fahrenheitInput.addEventListener("input", () => {
      const f = parseFloat(fahrenheitInput.value);
      if (!isNaN(f)) {
        celsiusInput.value = toCelsius(f).toFixed(2);
      }
    });
  </script>
</body>
</html>
