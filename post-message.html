<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Message</title>
  <link rel="stylesheet" href="css/theme.css">
  <script src="js/theme.js"></script>
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
  <h1>Send a Message</h1>
  <button id="sendBtn">Send</button>
  <p id="status"></p>

  <script>
    async function sendMessage() {
      try {
        const response = await fetch("https://oim.zhili.dev/message", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Token": "sultansultan"
          },
          body: JSON.stringify({ message: "Hello from my page" })
        });
        const data = await response.json();
        document.getElementById("status").textContent = "Sent! Server said: " + JSON.stringify(data);
      } catch (error) {
        document.getElementById("status").textContent = "Something went wrong.";
      }
    }

    document.getElementById("sendBtn").addEventListener("click", sendMessage);
  </script>
</body>
</html>
