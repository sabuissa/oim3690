<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reading Time Estimator</title>
  <style>
    body {
      width: 220px;
      font-family: Arial, sans-serif;
      padding: 14px;
      color: #333;
    }

    h1 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #1a1a2e;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
    }

    #wpm {
      width: 60px;
      padding: 4px 6px;
      font-size: 13px;
    }

    #status {
      font-size: 12px;
      color: #50a35a;
      height: 14px;
    }
  </style>
</head>
<body>
  <h1>Reading Time Estimator</h1>

  <div class="row">
    <label for="enabled">Show banner</label>
    <input type="checkbox" id="enabled" />
  </div>

  <div class="row">
    <label for="wpm">Words / minute</label>
    <input type="number" id="wpm" min="100" max="1000" step="10" />
  </div>

  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
