<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <script src="../js/theme.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .theme-toggle {
      display: block;
      margin: 0 auto 16px;
      padding: 6px 14px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }
    .theme-toggle:hover { opacity: 0.85; }

    [data-theme="dark"] body { background: #14141f; color: #e8e8e8; }
    [data-theme="dark"] h1 { color: #f5f5f5; }
    [data-theme="dark"] #task-input { background: #20202f; color: #e8e8e8; border-color: #3a3a4a; }
    [data-theme="dark"] #task-list li { background: #20202f; border-color: #3a3a4a; color: #e8e8e8; }
    [data-theme="dark"] #task-list li.done span { color: #777; }
    [data-theme="dark"] .theme-toggle { background: #20202f; color: #e8e8e8; border-color: #3a3a4a; }

    h1 {
      text-align: center;
      color: #333;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    #task-input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    #add-btn {
      padding: 10px 18px;
      font-size: 16px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #add-btn:hover {
      background: #357abd;
    }

    #task-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #task-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }

    #task-list li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    #task-list li span {
      flex: 1;
      font-size: 16px;
    }

    .delete-btn {
      background: #e25555;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .delete-btn:hover {
      background: #c0392b;
    }
  </style>
</head>
<body>

  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙 Dark</button>
  <h1>To-Do List</h1>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="What needs to be done?" />
    <button id="add-btn">Add</button>
  </div>

  <ul id="task-list"></ul>

  <script src="script.js"></script>
</body>
</html>
