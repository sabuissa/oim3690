<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    .checkout {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }

    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #111; }
    h2 { font-size: 1rem; font-weight: 600; color: #444; margin-bottom: 0.75rem; }

    /* Cart items */
    .cart { margin-bottom: 1.5rem; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid #eee;
      font-size: 0.95rem;
      color: #333;
    }

    .cart-item:last-child { border-bottom: none; }

    .cart-item .price { font-weight: 500; }

    /* Membership toggle */
    .membership {
      background: #f0f7ff;
      border: 1px solid #c3daf9;
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
    }

    .membership input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #2563eb;
    }

    .membership label {
      cursor: pointer;
      font-size: 0.95rem;
      color: #1e3a5f;
      font-weight: 500;
      user-select: none;
    }

    .membership .badge {
      margin-left: auto;
      background: #2563eb;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Order summary */
    .summary { border-top: 2px solid #eee; padding-top: 1.25rem; }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 0.5rem;
    }

    .summary-row.discount { color: #16a34a; font-weight: 500; }

    .summary-row.total {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
      border-top: 1px solid #eee;
      padding-top: 0.75rem;
      margin-top: 0.5rem;
    }

    #discount-label { font-style: italic; }

    /* CTA */
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.85rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #1d4ed8; }

    #confirmation {
      display: none;
      margin-top: 1rem;
      text-align: center;
      color: #16a34a;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="checkout">
    <h1>Checkout</h1>

    <!-- Cart -->
    <div class="cart">
      <h2>Your Cart</h2>
      <div class="cart-item"><span>Classic Tee × 2</span><span class="price">$38.00</span></div>
      <div class="cart-item"><span>Canvas Tote</span><span class="price">$24.00</span></div>
      <div class="cart-item"><span>Sticker Pack</span><span class="price">$8.00</span></div>
    </div>

    <!-- Membership toggle -->
    <div class="membership" onclick="document.getElementById('member-cb').click()">
      <input type="checkbox" id="member-cb" onclick="event.stopPropagation()" />
      <label for="member-cb">I'm a member</label>
      <span class="badge">Save more</span>
    </div>

    <!-- Order summary -->
    <div class="summary">
      <h2>Order Summary</h2>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">$70.00</span></div>
      <div class="summary-row discount">
        <span id="discount-label">Discount</span>
        <span id="discount-amount">—</span>
      </div>
      <div class="summary-row total"><span>Total</span><span id="total">$70.00</span></div>
    </div>

    <button onclick="handleCheckout()">Place Order</button>
    <p id="confirmation">Order placed! Thanks for shopping with us.</p>
  </div>

  <script>
    // ── Core discount function ───────────────────────────────────────────────
    // Returns the discount rate (0–1) given a cart total and membership status.
    // Tiers:
    //   < $50   → 5% member,  0% non-member
    //   $50–99  → 15% member, 5% non-member
    //   ≥ $100  → 20% member, 10% non-member
    function getDiscount(cartTotal, isMember) {
      if (cartTotal >= 100) {
        return isMember ? 0.20 : 0.10;
      } else if (cartTotal >= 50) {
        return isMember ? 0.15 : 0.05;
      } else {
        return isMember ? 0.05 : 0;
      }
    }
    // ────────────────────────────────────────────────────────────────────────

    const CART_ITEMS = [
      { name: "Classic Tee × 2", price: 38.00 },
      { name: "Canvas Tote",      price: 24.00 },
      { name: "Sticker Pack",     price:  8.00 },
    ];

    const cartTotal = CART_ITEMS.reduce((sum, item) => sum + item.price, 0);

    const memberCb       = document.getElementById("member-cb");
    const subtotalEl     = document.getElementById("subtotal");
    const discountLabel  = document.getElementById("discount-label");
    const discountAmount = document.getElementById("discount-amount");
    const totalEl        = document.getElementById("total");

    subtotalEl.textContent = "$" + cartTotal.toFixed(2);

    function updateSummary() {
      const isMember = memberCb.checked;
      const rate     = getDiscount(cartTotal, isMember);
      const savings  = cartTotal * rate;
      const final    = cartTotal - savings;

      if (rate === 0) {
        discountLabel.textContent  = "Discount";
        discountAmount.textContent = "—";
      } else {
        discountLabel.textContent  = `Discount (${(rate * 100).toFixed(0)}%${isMember ? " member" : ""})`;
        discountAmount.textContent = "-$" + savings.toFixed(2);
      }

      totalEl.textContent = "$" + final.toFixed(2);
    }

    memberCb.addEventListener("change", updateSummary);
    updateSummary();

    function handleCheckout() {
      document.getElementById("confirmation").style.display = "block";
    }
  </script>
</body>
</html>
